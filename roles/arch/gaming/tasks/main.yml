---
- name: Enable multilib repository
  become: true
  ansible.builtin.replace:
    path: /etc/pacman.conf
    regexp: "^#\\[multilib\\]\\n#Include = /etc/pacman.d/mirrorlist"
    replace: "[multilib]\nInclude = /etc/pacman.d/mirrorlist"
  register: multilib_enabled
  notify: Update pacman cache
- name: Install AMD Graphics Stack (Mesa + Vulkan)
  become: true
  community.general.pacman:
    update_cache: "{{ multilib_enabled.changed }}"
    name:
      - mesa
      - lib32-mesa
      - vulkan-radeon
      - lib32-vulkan-radeon
      - libva-mesa-driver
      - lib32-libva-mesa-driver
    state: present

- name: Install Steam and Essential Tools
  become: true
  become_user: aur_builder
  vars:
    ansible_python_interpreter: /usr/bin/python3
  kewlfft.aur.aur:
    name:
      - steam
      - xpadneo-dkms
      - flatpak
      - discord
      - lutris
      - wine
      - wine-mono
      - wine-geko
      - gamemode
      - lib32-gamemode
      - mangohud
      - lib32-mangohud
      - sunshine-bin
    use: yay
      
- name: Install Linux-Zen Kernel for better responsiveness
  become: true
  community.general.pacman:
    name:
      - linux-zen
      - linux-zen-headers
    state: present
- name: Set vm.max_map_count for Steam/Proton
  become: true
  ansible.posix.sysctl:
    name: vm.max_map_count
    value: "2147483642"
    state: present
    sysctl_file: /etc/sysctl.d/80-gaming.conf
