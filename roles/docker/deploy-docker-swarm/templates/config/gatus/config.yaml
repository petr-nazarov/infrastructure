metrics: false
ui:
  title: Home server status
  header: Home server status
  default-sort-by: group
storage:
  type: postgres
  path: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}?sslmode=disable"
alerting:
  pushover:
    application-token: "${PUSHOVER_APP_TOKEN}"
    user-key: "${PUSHOVER_USER_KEY}"
    priority: 1
    resolved-priority: 0
    default-alert:
      send-on-resolved: true
      failure-threshold: 5
      success-threshold: 1
announcements:
  - timestamp: 2026-02-01T14:00:00Z
    archived: true
    type: warning
    message: "Scheduled move to new infra. Some services will be unavailable"
endpoints:
  ## External
  - name: Frrcode company website
    url: https://frrcode.com
    interval: 1m
    group: 40 - External
    conditions:
      - "[STATUS] == 200"
      - "[BODY] == pat(*Frrcode*)"
    alerts:
      - type: pushover
  - name: Nzrv Blog - personal blog
    url: https://blog.${PUBLIC_TOP_DOMAIN}
    interval: 1m
    group: 40 - External
    conditions:
      - "[STATUS] == 200"
      - "[BODY] == pat(*Docker*)"
    alerts:
      - type: pushover
  - name: CV - personal website
    url: https://cv.${PUBLIC_TOP_DOMAIN}
    interval: 1m
    group: 40 - External
    conditions:
      - "[STATUS] == 200"
      - "[BODY] == pat(*Petr Nazarov*)"
    alerts:
      - type: pushover
  ## Public
  - name: AdGuard - Public DNS
    url: https://dns.${PUBLIC_TOP_DOMAIN}
    interval: 1m
    group: 50 - Public
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: pushover
  - name: Tinyproxy - HTTP Proxy
    url: "tcp://proxy.${PUBLIC_TOP_DOMAIN}:8888"
    interval: 1m
    group: 50 - Public
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: pushover
  ## Infra Management
  - name: WGEasy - VPN dashboard
    url: https://wg-home.${PUBLIC_TOP_DOMAIN}
    interval: 1m
    group: 51 - Infra Management
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 48h"
    alerts:
      - type: pushover
  - name: AdGuard - Local DNS
    url: http://adguardhome:80
    interval: 1m
    group: 51 - Infra Management
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: pushover
  # - name: CrowdSec LAPI
  #   group: 51 - Infra Management
  #   url: "http://crowdsec:8080/health" # CrowdSec exposes a health check endpoint
  #   interval: 1m
  #   conditions:
  #     - "[STATUS] == 200"
  #     - "[BODY].status == up"
  - name: Gatus - Status page
    url: http://gatus:8080/
    interval: 1m
    group: 51 - Infra Management
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: pushover
  - name: Upsnap - wake on lan
    url: http://${LOCAL_DNS}:8090/api/health
    interval: 1m
    group: 51 - Infra Management
    conditions:
      - "[STATUS] == 200"
      - "[BODY].code == 200"
    alerts:
      - type: pushover
  - name: Beszel - System Monitoring
    url: http://beszel.${TOP_LOCAL_DOMAIN}/api/health
    interval: 1m
    group: 51 - Infra Management
    conditions:
      - "[STATUS] == 200"
      - "[BODY].code == 200"
    alerts:
      - type: pushover
  - name: Glance - Home page
    url: http://glance:8080/api/healthz
    interval: 1m
    group: 51 - Infra Management
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: pushover
  ## Media
  - name: Jellyfin
    url: http://jellyfin.${LOCAL_MEDIA_DOMAIN}/health
    interval: 1m
    group: 52 - Media
    conditions:
      - "[STATUS] == 200"
      - "[BODY] == Healthy"
    alerts:
      - type: pushover
  - name: Bazarr
    url: http://bazarr.${LOCAL_MEDIA_DOMAIN}/api/system/ping
    interval: 1m
    group: 52 - Media
    conditions:
      - "[STATUS] == 200"
      - "[BODY].status == OK"
    alerts:
      - type: pushover
  - name: Radarr
    url: http://radarr.${LOCAL_MEDIA_DOMAIN}/ping
    interval: 1m
    group: 52 - Media
    conditions:
      - "[STATUS] == 200"
      - "[BODY].status == OK"
    alerts:
      - type: pushover
  - name: Sonarr
    url: http://sonarr.${LOCAL_MEDIA_DOMAIN}/ping
    interval: 1m
    group: 52 - Media
    conditions:
      - "[STATUS] == 200"
      - "[BODY].status == OK"
    alerts:
      - type: pushover
  - name: Prowlarr
    url: http://prowlarr.${LOCAL_MEDIA_DOMAIN}/ping
    interval: 1m
    group: 52 - Media
    conditions:
      - "[STATUS] == 200"
      - "[BODY].status == OK"
    alerts:
      - type: pushover
  - name: Transmission - torrent
    url: http://transmission.$LOCAL_MEDIA_DOMAIN
    interval: 1m
    group: 52 - Media
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: pushover
  - name: Miniflux 
    url: https://rss.${PUBLIC_TOP_DOMAIN}/healthcheck
    interval: 1m
    group: 53 - Other
    conditions:
      - "[STATUS] == 200"
      - "[BODY] == pat(*OK*)"
    alerts:
      - type: pushover
  # - name: Ollama
  #   url: http://ollama.${LOCAL_DESKTOP_DOMAIN}/api/version
  #   interval: 1m
  #   group: 53 - Desktop
  #   conditions:
  #     - "[STATUS] == 200"
  #     - "[BODY].version != null"
  # DNS
  - name: Cloudflare
    url: https://www.cloudflarestatus.com/
    interval: 1m
    group: DNS
    conditions:
      - "[STATUS] == 200"
      - "[BODY] == pat(*All Systems Operational*)"
    alerts:
      - type: pushover
  - name: DNS *.${PUBLIC_TOP_DOMAIN}
    url: "8.8.8.8" # Address of the DNS server to use
    group: DNS
    interval: 1m
    dns:
      query-name: "$PUBLIC_HOME_DOMAIN"
      query-type: "A"
    conditions:
      - "[DNS_RCODE] == NOERROR"
    alerts:
      - type: pushover
  ## Syncthing
  - name: Syncthing Edge
    url: http://syncthing-edge:8384/rest/noauth/health
    interval: 1m
    group: 54 - Syncthing
    conditions:
      - "[STATUS] == 200"
      - "[BODY].status == OK"
    alerts:
      - type: pushover
  - name: Syncthing Media
    url: http://syncthing-media:8384/rest/noauth/health
    interval: 1m
    group: 54 - Syncthing
    conditions:
      - "[STATUS] == 200"
      - "[BODY].status == OK"
    alerts:
      - type: pushover
  - name: Syncthing Desktop
    url: http://sync.${LOCAL_DESKTOP_DOMAIN}/rest/noauth/health
    interval: 1m
    group: 54 - Syncthing
    conditions:
      - "[STATUS] == 200"
      - "[BODY].status == OK"
